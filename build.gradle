plugins {
    id 'java'
    id 'net.labymod.gradle' version '0.2.28'
}

group = 'ru.krosovok'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

labyMod {
    defaultPackage = 'ru.krosovok.krshubswap'
    clientVersion = '1.16.5-40'
}

dependencies {
    labyModApi 'net.labymod.api:labymod-api:1.0.0'
    labyModRuntime 'net.labymod:labymod:1.16.5-40'
    
    implementation 'com.google.code.gson:gson:2.8.9'
}

repositories {
    mavenCentral()
    maven {
        url 'https://labymod.net/maven'
    }
    maven {
        url 'https://libraries.minecraft.net/'
    }
}
